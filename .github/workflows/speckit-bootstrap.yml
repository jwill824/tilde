# Runs once to initialise kit submodules and create symlinks.
# After the first successful run, this workflow is effectively a no-op.
name: Bootstrap speckit

on:
  push:
    branches: [main]
    paths:
      - ".gitmodules"
  workflow_dispatch: {}

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}


      - name: Fetch speckit-core submodule
        run: |
          if [ ! -d .speckit ]; then
            git clone --depth=1 --branch main \
              https://github.com/jwill824/speckit-core.git .speckit
          else
            git -C .speckit fetch --depth=1 origin main
            git -C .speckit reset --hard origin/main
          fi

      - name: Create speckit symlinks
        run: |
          mkdir -p .specify/memory .specify/extensions .specify/integrations specs
          for link_pair in \
            ".specify/templates:../.speckit/.specify/templates" \
            ".specify/scripts:../.speckit/.specify/scripts"; do
            link="${link_pair%%:*}"
            target="${link_pair##*:}"
            if [ ! -e "$link" ] && [ ! -L "$link" ]; then
              mkdir -p "$(dirname "$link")"
              ln -s "$target" "$link"
              echo "Linked $link → $target"
            fi
          done

          for dir_pair in \
            ".speckit/.specify/extensions:.specify/extensions" \
            ".speckit/.specify/integrations:.specify/integrations"; do
            source_dir="${dir_pair%%:*}"
            target_dir="${dir_pair##*:}"
            if [ -d "$source_dir" ]; then
              mkdir -p "$target_dir"
              for src in "$source_dir"/*; do
                [ -e "$src" ] || continue
                name="$(basename "$src")"
                case "$name" in
                  .*) continue ;;
                esac
                link="$target_dir/$name"
                target="../../$source_dir/$name"
                if [ ! -e "$link" ] && [ ! -L "$link" ]; then
                  ln -s "$target" "$link"
                  echo "Linked $link → $target"
                fi
              done
            fi
          done

          if [ ! -f .specify/extensions.yml ] && [ -f .speckit/.specify/extensions.yml ]; then
            cp .speckit/.specify/extensions.yml .specify/extensions.yml
            echo "Copied .specify/extensions.yml"
          fi

      - name: Create memory stubs
        run: |
          if [ ! -f .specify/memory/constitution.md ]; then
            cp .speckit/.specify/templates/constitution-template.md .specify/memory/constitution.md
          fi
          if [ ! -f .specify/memory/stack.md ]; then
            cp .speckit/.specify/templates/stack-template.md .specify/memory/stack.md
          fi
          if [ ! -f .specify/memory/issues-backlog.md ]; then
            printf '%s\n' \
              "# GitHub Issues Backlog" \
              "<!-- Auto-updated by /speckit.specify via issue-triage agent -->" \
              "<!-- last_refreshed: never -->" \
              "" \
              "| Issue | Title | Status | Linked Spec |" \
              "|-------|-------|--------|-------------|" \
              > .specify/memory/issues-backlog.md
          fi



      - name: Fetch copilot kit submodule
        run: |
          kit_path=".copilot"
          kit_repo="copilot-kit"
          if [ ! -d "$$kit_path" ]; then
            git clone --depth=1 --branch main \
              https://github.com/jwill824/$$kit_repo "$$kit_path"
          else
            git -C "$$kit_path" fetch --depth=1 origin main
            git -C "$$kit_path" reset --hard origin/main
          fi

      - name: Link copilot integration
        run: |
          if [ -x .speckit/.specify/scripts/bash/link-ai-integration.sh ] && [ -f .copilot/.specify/ai-kit.manifest.json ]; then
            bash .speckit/.specify/scripts/bash/link-ai-integration.sh copilot .copilot
          else
            mkdir -p .github

            mkdir -p .github/agents
            for src in .copilot/.github/agents/*; do
              fname="$(basename "$$src")"
              if [[ "$$fname" == speckit.* ]] && [ ! -d .speckit ]; then
                echo "Skipping speckit agent $$fname (speckit-core not bootstrapped)"
                continue
              fi
              link=".github/agents/$$fname"
              if [ ! -e "$$link" ] && [ ! -L "$$link" ]; then
                ln -s "../../.copilot/.github/agents/$$fname" "$$link"
                echo "Linked $$link → ../../.copilot/.github/agents/$$fname"
              fi
            done

            for link_pair in \
              ".github/prompts:../.copilot/.github/prompts" \
              ".github/skills:../.copilot/.github/skills" \
              ".github/hooks:../.copilot/.github/hooks"; do
              link="${link_pair%%:*}"
              target="${link_pair##*:}"
              if [ ! -e "$$link" ] && [ ! -L "$$link" ]; then
                mkdir -p "$(dirname "$$link")"
                ln -s "$$target" "$$link"
                echo "Linked $$link → $$target"
              fi
            done

            if [ ! -f .github/copilot-instructions.md ] && [ -f .copilot/.github/copilot-instructions.md ]; then
              cp .copilot/.github/copilot-instructions.md .github/copilot-instructions.md
              echo "Copied .github/copilot-instructions.md"
            fi
          fi


      - name: Write project-tooling.json
        run: |
          if [ ! -f .specify/project-tooling.json ]; then
            mkdir -p .specify
            {
              echo '{'
              echo '  "spec_workflow": true,'
              echo '  "ai_tool": "copilot",'
              echo '  "ai_kit_path": ".copilot"'
              echo '}'
            } > .specify/project-tooling.json
            echo "Wrote .specify/project-tooling.json"
          fi

      - name: Create docs scaffold
        run: |
          if [ -f README.md ]; then
            rm README.md
            echo "Removed auto-init root README.md"
          fi
          BADGE='[![spec-kit powered](https://img.shields.io/badge/spec--kit-powered-blueviolet)](https://github.com/github/spec-kit)'
          if [ -f docs/README.md ] && ! grep -q "spec--kit-powered" docs/README.md; then
            awk -v badge="$BADGE" 'NR==1{print; print ""; print badge; next}1' docs/README.md > docs/README.md.tmp
            mv docs/README.md.tmp docs/README.md
            echo "Added spec-kit badge to docs/README.md"
          fi

      - name: Open bootstrap PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/bootstrap-speckit
          title: "chore: initialise kit submodules and symlinks"
          commit-message: "chore: initialise kit submodules and symlinks"
          body: |
            Automated PR from the speckit-bootstrap workflow.

            Adds submodule references, symlinks, and memory stubs for speckit-core and copilot-kit.
            Safe to merge immediately — this is a one-time idempotent scaffold.
          labels: "chore"
          delete-branch: true
