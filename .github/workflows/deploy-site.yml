name: Deploy Site

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
  pull_request:
    branches:
      - main
    paths:
      - 'site/**'
  workflow_dispatch:

jobs:
  build:
    name: Build & Deploy (tilde.thingstead.io)
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || '' }}
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site/docs

      - name: Build docs site
        run: npm run build
        working-directory: site/docs

      - name: Assemble site output
        run: |
          mkdir -p dist/docs
          cp -r site/tilde/. dist/
          cp -r site/docs/dist/. dist/docs/

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=thingstead-tilde
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
